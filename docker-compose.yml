services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  web:
    build: ./web
    env_file: .env
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
